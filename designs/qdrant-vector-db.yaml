apiVersion: v1
kind: Namespace
metadata:
  name: ai-data
  labels:
    app.kubernetes.io/part-of: digitalocean-academy
    academy.do/design: qdrant-vector-db
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: ai-data
  labels:
    app: qdrant
spec:
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: ai-data
  labels:
    app: qdrant
    app.kubernetes.io/part-of: digitalocean-academy
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        # DigitalOcean Block Storage CSI driver.
        storageClassName: do-block-storage
        resources:
          requests:
            storage: 10Gi
